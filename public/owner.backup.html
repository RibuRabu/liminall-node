<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <title>Liminall Node</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    @font-face {
      font-family: "Rotis Sans Serif";
      src: url("/fonts/RotisSansSerif.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg-1: #23b7c9;
      --bg-2: #53c1b4;
      --bg-3: #8ac27d;
      --bg-4: #e7cf55;

      --text: #13202a;
      --text-soft: rgba(19, 32, 42, 0.72);
      --text-faint: rgba(19, 32, 42, 0.56);

      --card-bg: rgba(255, 255, 255, 0.66);
      --card-border: rgba(255, 255, 255, 0.42);
      --card-shadow: 0 20px 60px rgba(23, 41, 52, 0.16);

      --surface: rgba(255, 255, 255, 0.34);
      --surface-border: rgba(255, 255, 255, 0.34);

      --input-bg: rgba(255, 255, 255, 0.72);
      --input-border: rgba(19, 32, 42, 0.14);

      --primary: #13202a;
      --primary-text: #ffffff;

      --secondary-bg: rgba(255, 255, 255, 0.34);
      --secondary-text: #13202a;
      --secondary-border: rgba(19, 32, 42, 0.12);

      --success: #1f7a36;
      --success-soft: rgba(31, 122, 54, 0.10);
      --success-border: rgba(31, 122, 54, 0.18);

      --danger: #8d2342;
      --danger-soft: rgba(141, 35, 66, 0.10);
      --danger-border: rgba(141, 35, 66, 0.18);

      --error: #9c1f36;
      --error-soft: rgba(156, 31, 54, 0.10);
      --error-border: rgba(156, 31, 54, 0.18);

      --notice-bg: rgba(255, 255, 255, 0.38);
      --notice-border: rgba(255, 255, 255, 0.42);

      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body,
    button,
    input,
    textarea,
    select,
    a {
      font-family: "Rotis Sans Serif", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.20), transparent 26%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.12), transparent 24%),
        linear-gradient(
          90deg,
          var(--bg-1) 0%,
          var(--bg-2) 30%,
          var(--bg-3) 60%,
          var(--bg-4) 100%
        );
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .page-shell {
      max-width: 1240px;
      margin: 0 auto;
    }

    .page {
      display: grid;
      gap: 20px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.40);
      border-radius: 30px;
      padding: 20px;
      backdrop-filter: blur(20px);
      box-shadow: var(--card-shadow);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.28), transparent 20%),
        radial-gradient(circle at 88% 22%, rgba(255, 255, 255, 0.16), transparent 22%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar-left {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-logo-frame {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 108px;
      height: 108px;
      padding: 14px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 12px 34px rgba(23, 41, 52, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.58);
      overflow: hidden;
    }

    .brand-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-meta {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(19, 32, 42, 0.62);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.44);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(19, 32, 42, 0.76);
    }

    #pageTitle {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .muted {
      color: var(--text-soft);
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .lang-button,
    .link-button {
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.28);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      min-width: 54px;
      backdrop-filter: blur(10px);
      transition: 0.16s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .lang-button:hover,
    .link-button:hover {
      background: rgba(255, 255, 255, 0.42);
    }

    .lang-button.active {
      background: var(--primary);
      color: var(--primary-text);
      border-color: rgba(19, 32, 42, 0.2);
    }

    .link-button.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .hero-notice {
      min-height: 22px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--notice-bg);
      border: 1px solid var(--notice-border);
      font-size: 14px;
      font-weight: 700;
    }

    .hero-notice:empty {
      display: none;
    }

    .hero-notice.success {
      color: var(--success);
      background: var(--success-soft);
      border-color: var(--success-border);
    }

    .hero-notice.error {
      color: var(--error);
      background: var(--error-soft);
      border-color: var(--error-border);
    }

    .hero-summary {
      display: grid;
      gap: 12px;
    }

    .hero-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-chip {
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 16px;
      padding: 14px 16px;
      display: grid;
      gap: 6px;
    }

    .hero-chip-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(19, 32, 42, 0.58);
    }

    .hero-chip-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 20px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 22px;
      backdrop-filter: blur(18px);
      box-shadow: var(--card-shadow);
    }

    .card-header {
      display: grid;
      gap: 6px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .small {
      font-size: 13px;
    }

    .section-stack {
      display: grid;
      gap: 18px;
    }

    .section-block {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--surface-border);
    }

    .section-block h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .identifier {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.40);
      border: 1px solid rgba(255, 255, 255, 0.42);
      color: var(--text);
    }

    .meta {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .meta-row {
      background: rgba(255, 255, 255, 0.30);
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .meta-label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: rgba(19, 32, 42, 0.58);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .node-panel {
      display: grid;
      gap: 14px;
    }

    .node-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .node-panel-name {
      display: grid;
      gap: 8px;
    }

    .node-panel-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.02;
    }

    .node-panel-subtitle {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.45;
      max-width: 42ch;
    }

    .node-image-card {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.30);
      border: 1px solid rgba(255, 255, 255, 0.36);
    }

    .node-image-preview {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 180px;
      border-radius: 18px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.18)),
        rgba(255, 255, 255, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.38);
    }

    .node-image-preview.has-image {
      padding: 0;
    }

    .node-image-preview.empty {
      padding: 24px;
    }

    .node-image-preview img {
      display: block;
      width: 100%;
      max-height: 280px;
      object-fit: cover;
    }

    .node-image-empty {
      display: grid;
      gap: 10px;
      text-align: center;
      justify-items: center;
      max-width: 30ch;
    }

    .node-image-empty-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.52);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(19, 32, 42, 0.68);
    }

    .node-image-empty-text {
      font-size: 14px;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
    }

    button {
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.16s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .primary-button {
      border: 1px solid rgba(19, 32, 42, 0.18);
      background: var(--primary);
      color: var(--primary-text);
    }

    .secondary-button {
      background: var(--secondary-bg);
      color: var(--secondary-text);
      border: 1px solid var(--secondary-border);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.34);
      color: var(--secondary-text);
      border: 1px solid rgba(19, 32, 42, 0.10);
    }

    .danger-button {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }

    .status-action-button {
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(19, 32, 42, 0.10);
      color: var(--text);
    }

    .status-action-active {
      color: var(--success);
      border-color: var(--success-border);
      background: var(--success-soft);
    }

    .status-action-lost {
      color: var(--danger);
      border-color: var(--danger-border);
      background: var(--danger-soft);
    }

    button:disabled,
    .link-button:disabled {
      opacity: 0.55;
      cursor: default;
      transform: none;
    }

    input[type="text"],
    input[type="file"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--input-border) !important;
      background: var(--input-bg) !important;
      color: var(--text) !important;
      border-radius: 14px;
      padding: 13px 14px;
      caret-color: var(--text) !important;
      box-shadow: none !important;
      opacity: 1 !important;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: rgba(19, 32, 42, 0.38) !important;
      opacity: 1 !important;
    }

    input[type="text"]:focus,
    input[type="file"]:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid rgba(19, 32, 42, 0.12);
      border-color: rgba(19, 32, 42, 0.22) !important;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .field-hint {
      font-size: 12px;
      color: var(--text-faint);
      line-height: 1.45;
    }

    .contact-grid {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .contact-row {
      background: rgba(255, 255, 255, 0.26);
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .contact-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .contact-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-soft);
      font-weight: 600;
    }

    .contact-toggle input {
      width: auto;
      margin: 0;
      accent-color: var(--primary);
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .event {
      background: rgba(255, 255, 255, 0.26);
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 16px;
      padding: 14px 16px;
      display: grid;
      gap: 6px;
    }

    .event-type {
      font-weight: 800;
      color: var(--text);
    }

    .event-time {
      font-size: 12px;
      color: var(--text-faint);
    }

    .event-payload {
      font-size: 13px;
      color: var(--text-soft);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }

    @media (max-width: 920px) {
      body {
        padding: 14px;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .hero-summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card,
      .hero {
        padding: 18px;
        border-radius: 24px;
      }

      .section-block {
        padding: 16px;
      }
    }

    @media (max-width: 640px) {
      .hero-summary-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
      }

      .topbar-right {
        width: 100%;
      }

      .lang-button,
      .link-button {
        flex: 1;
      }

      #pageTitle {
        font-size: 30px;
      }

      .node-panel-head {
        flex-direction: column;
      }

      .brand-row {
        align-items: center;
      }

      .brand-logo-frame {
        width: 88px;
        height: 88px;
        padding: 12px;
        border-radius: 22px;
      }

      .button-row button,
      .button-row a {
        width: 100%;
      }

      .card-header {
        margin-bottom: 14px;
      }

      .node-image-preview {
        min-height: 150px;
      }

      .node-image-preview img {
        max-height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="page">
      <div class="hero">
        <div class="hero-inner">
          <div class="topbar">
            <div class="topbar-left">
              <div class="brand-row">
                <div class="brand-logo-frame">
                  <img src="/logo.svg" alt="Liminall" class="brand-logo" />
                </div>

                <div class="brand-meta">
                  <div class="brand-name">Liminall</div>
                  <div class="eyebrow">Node Control Panel</div>
                </div>
              </div>

              <h1 id="pageTitle"></h1>
              <div id="pageSubtitle" class="muted"></div>
            </div>

            <div class="topbar-right">
              <a id="openPublicPageButton" class="link-button disabled" href="#" target="_blank" rel="noopener noreferrer">Avaa Node</a>
              <button id="langFi" class="lang-button" type="button">FI</button>
              <button id="langEn" class="lang-button" type="button">EN</button>
            </div>
          </div>

          <div id="actionStatus" class="hero-notice"></div>

          <div class="hero-summary">
            <div id="heroSummary" class="hero-summary-grid"></div>
          </div>
        </div>
      </div>

      <div class="main-grid">
        <div class="stack">
          <div class="card">
            <div class="node-panel">
              <div class="node-panel-head">
                <div class="node-panel-name">
                  <div class="muted small" id="nodeCardTitle"></div>
                  <div class="node-panel-title" id="nodePanelTitle">Node</div>
                  <div class="node-panel-subtitle" id="controlsCardIntro"></div>
                </div>
              </div>

              <div id="nodeInfo"></div>

              <div class="node-image-card">
                <div id="nodeImagePreview" class="node-image-preview empty"></div>

                <div class="field">
                <label id="nodeImageInputLabel" class="field-label" for="nodeImageInput"></label>
                <input id="nodeImageInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
                <div id="nodeImageHint" class="field-hint"></div>
                </div>

                <div class="button-row">
                  <button id="saveNodeImageButton" class="primary-button" type="button"></button>
                  <button id="clearNodeImageSelectionButton" class="ghost-button" type="button"></button>
                  <button id="removeNodeImageButton" class="danger-button" type="button"></button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="stack">
          <div class="card">
            <div class="card-header">
              <h2 id="controlsCardTitle"></h2>
            </div>

            <div class="section-stack">
              <div class="section-block">
                <h3 id="identitySectionTitle"></h3>

                <div class="field">
                  <label id="profileNameLabel" class="field-label" for="profileName"></label>
                  <input id="profileName" type="text" maxlength="120" />
                </div>

                <div class="field">
                  <label id="publicMessageLabel" class="field-label" for="publicMessage"></label>
                  <textarea id="publicMessage" maxlength="2000"></textarea>
                </div>

                <div class="button-row">
                  <button id="saveIdentityButton" class="primary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="statusSectionTitle"></h3>
                <div class="button-row">
                  <button id="setActiveButton" class="status-action-button status-action-active" type="button"></button>
                  <button id="setLostButton" class="status-action-button status-action-lost" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="locationSectionTitle"></h3>
                <p id="locationSectionIntro" class="muted small"></p>

                <div class="field">
                  <label id="locationLabel" class="field-label" for="locationInput"></label>
                  <input id="locationInput" type="text" maxlength="255" />
                  <div id="locationHint" class="field-hint"></div>
                </div>

                <div class="button-row">
                  <label class="contact-toggle">
                    <input id="showLocationInput" type="checkbox" />
                    <span id="showLocationLabel"></span>
                  </label>
                </div>

                <div class="button-row">
                  <button id="saveLocationButton" class="primary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="contactSectionTitle"></h3>
                <p id="contactSectionIntro" class="muted small"></p>

                <div class="contact-grid">
                  <div class="contact-row">
                    <div class="contact-row-top">
                      <label id="phoneLabel" class="field-label" for="phoneInput"></label>
                      <label class="contact-toggle">
                        <input id="showPhoneInput" type="checkbox" />
                        <span id="showPhoneLabel"></span>
                      </label>

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      const tokenFromQuery = params.get("token");

      if (tokenFromQuery && tokenFromQuery.trim() !== "") {
        return tokenFromQuery.trim();
      }

      const path = window.location.pathname.replace(/\/+$/, "");
      const parts = path.split("/");

      if (parts.length >= 3 && parts[1] === "o") {
        return parts[2];
      }

      return null;
    }

    function getLanguage() {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get("lang");

      if (lang === "en") return "en";
      if (lang === "fi") return "fi";

      return "fi";
    }

    function setLanguage(lang) {
      currentLang = lang === "en" ? "en" : "fi";

      const url = new URL(window.location.href);
      url.searchParams.set("lang", currentLang);
      window.history.replaceState({}, "", url.toString());

      renderStaticTexts();
      renderNode();
      renderTimeline();
      updateLanguageButtons();
      renderNodeImagePanel();
    }

    function updateLanguageButtons() {
      document.getElementById("langFi").classList.toggle("active", currentLang === "fi");
      document.getElementById("langEn").classList.toggle("active", currentLang === "en");
    }

    function t(key) {
      return i18n[currentLang][key] || key;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isTruthyDbValue(value) {
      return value === 1 || value === true || value === "1";
    }

    function formatStatus(status) {
      if (currentLang === "fi") {
        if (status === "active") return "aktiivinen";
        if (status === "lost") return "kadonnut";
      }

      return status || "";
    }

    function formatPreferredContact(value) {
      const normalized = typeof value === "string" ? value.trim().toLowerCase() : "";

      if (normalized === "phone") return t("preferred_contact_phone");
      if (normalized === "sms") return t("preferred_contact_sms");
      if (normalized === "whatsapp") return t("preferred_contact_whatsapp");
      if (normalized === "email") return t("preferred_contact_email");

      return t("preferred_contact_none");
    }

    function translateEventType(type) {
      return t(`event_${type}`) || type;
    }

    function updatePublicPageButton() {
      const link = document.getElementById("openPublicPageButton");

      if (!currentNode || !currentNode.public_slug) {
        link.href = "#";
        link.classList.add("disabled");
        return;
      }

      link.href = `/n/${encodeURIComponent(currentNode.public_slug)}`;
      link.classList.remove("disabled");
      link.textContent = t("open_public_page");
    }

    function revokeSelectedImagePreviewUrl() {
      if (selectedImagePreviewUrl) {
        URL.revokeObjectURL(selectedImagePreviewUrl);
        selectedImagePreviewUrl = null;
      }
    }

    function getCurrentImageUrl() {
      if (!currentNode || typeof currentNode.profile_image_url !== "string") {
        return "";
      }

      return currentNode.profile_image_url.trim();
    }

    function clearSelectedImage() {
      selectedImageFile = null;
      revokeSelectedImagePreviewUrl();

      const input = document.getElementById("nodeImageInput");
      if (input) {
        input.value = "";
      }
    }

    function setImageButtonsDisabledState() {
      const saveButton = document.getElementById("saveNodeImageButton");
      const clearButton = document.getElementById("clearNodeImageSelectionButton");
      const removeButton = document.getElementById("removeNodeImageButton");

      const hasCurrentImage = getCurrentImageUrl() !== "";
      const hasSelectedImage = !!selectedImageFile;

      saveButton.disabled = imageOperationInFlight || !hasSelectedImage;
      clearButton.disabled = imageOperationInFlight || !hasSelectedImage;
      removeButton.disabled = imageOperationInFlight || !hasCurrentImage;
    }

    function renderNodeImagePanel() {
      const preview = document.getElementById("nodeImagePreview");
      const currentImageUrl = getCurrentImageUrl();
      const hasSelectedPreview = !!selectedImagePreviewUrl;
      const hasCurrentImage = currentImageUrl !== "";

      if (hasSelectedPreview) {
        preview.className = "node-image-preview has-image";
        preview.innerHTML = `
          <img src="${escapeHtml(selectedImagePreviewUrl)}" alt="${escapeHtml(t("node_card_title"))}" />
        `;
      } else if (hasCurrentImage) {
        preview.className = "node-image-preview has-image";
        preview.innerHTML = `
          <img src="${escapeHtml(currentImageUrl)}" alt="${escapeHtml(t("node_card_title"))}" />
        `;
      } else {
        preview.className = "node-image-preview empty";
        preview.innerHTML = `
          <div class="node-image-empty">
            <div class="node-image-empty-badge">${escapeHtml(t("node_image_empty_title"))}</div>
            <div class="node-image-empty-text">${escapeHtml(t("node_image_empty_text"))}</div>

      }

      setImageButtonsDisabledState();
    }

          <div class="hero-chip-label">${escapeHtml(t("slug"))}</div>
          <div class="hero-chip-value">${escapeHtml(currentNode.public_slug ?? "—")}</div>
        </div>
      `;
    }

    function renderNode() {
      if (!currentNode) return;

      const reportsEnabled = isTruthyDbValue(currentNode.allow_anonymous_report);
      const locationVisible = isTruthyDbValue(currentNode.show_last_recovery_point);
      const locationText = currentNode.last_recovery_label ?? "";
      const nodeInfo = document.getElementById("nodeInfo");

      renderHeroSummary();
      updatePublicPageButton();

      document.getElementById("nodePanelTitle").textContent = currentNode.profile_name?.trim() || t("node_card_title");

      nodeInfo.innerHTML = `
        <div class="identifier">${escapeHtml(currentNode.public_identifier ?? "")}</div>
        <div class="meta">
          <div class="meta-row">
            <span class="meta-label">${escapeHtml(t("status"))}</span>
            <div class="status-badge">${escapeHtml(formatStatus(currentNode.status))}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">${escapeHtml(t("slug"))}</span>
            <div>${escapeHtml(currentNode.public_slug ?? "")}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">${escapeHtml(t("finder_messages_status"))}</span>
            <div>${escapeHtml(reportsEnabled ? t("finder_messages_enabled") : t("finder_messages_disabled"))}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">${escapeHtml(t("preferred_contact_status"))}</span>
            <div>${escapeHtml(formatPreferredContact(currentNode.preferred_contact))}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">${escapeHtml(t("location_status"))}</span>
            <div>${escapeHtml(locationText || t("location_empty"))}</div>
            <div class="muted small" style="margin-top: 6px;">${escapeHtml(locationVisible ? t("location_visible") : t("location_hidden"))}</div>
          </div>
        </div>
      `;

      document.getElementById("toggleReportsButton").textContent = reportsEnabled
        ? t("disable_reports")
        : t("enable_reports");

      document.getElementById("profileName").value = currentNode.profile_name ?? "";
      document.getElementById("publicMessage").value = currentNode.public_message ?? "";

      document.getElementById("phoneInput").value = currentNode.phone ?? "";
      document.getElementById("smsInput").value = currentNode.sms ?? "";
      document.getElementById("whatsappInput").value = currentNode.whatsapp ?? "";
      document.getElementById("emailInput").value = currentNode.email ?? "";

      document.getElementById("showPhoneInput").checked = isTruthyDbValue(currentNode.show_phone);
      document.getElementById("showSmsInput").checked = isTruthyDbValue(currentNode.show_sms);
      document.getElementById("showWhatsappInput").checked = isTruthyDbValue(currentNode.show_whatsapp);
      document.getElementById("showEmailInput").checked = isTruthyDbValue(currentNode.show_email);

      document.getElementById("preferredContact").value = (currentNode.preferred_contact || "none").toLowerCase();

      document.getElementById("locationInput").value = currentNode.last_recovery_label ?? "";
      document.getElementById("showLocationInput").checked = isTruthyDbValue(currentNode.show_last_recovery_point);

      renderNodeImagePanel();
    }

    function renderTimeline() {
      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";

      if (!currentEvents.length) {
        timeline.innerHTML = `<div class="muted">${escapeHtml(t("empty_timeline"))}</div>`;
        return;
      }

      for (const event of currentEvents) {
        const wrapper = document.createElement("div");
        wrapper.className = "event";

        const payloadText = event.payload
          ? `${t("timeline_payload_prefix")}: ${JSON.stringify(event.payload, null, 2)}`
          : "";

        wrapper.innerHTML = `
          <div class="event-type">${escapeHtml(translateEventType(event.event_type))}</div>
          <div class="event-time">${escapeHtml(new Date(event.created_at).toLocaleString(currentLang === "fi" ? "fi-FI" : "en-US"))}</div>
          ${payloadText ? `<div class="event-payload">${escapeHtml(payloadText)}</div>` : ""}
        `;

        timeline.appendChild(wrapper);
      }
    }

    async function fetchOwnerNode() {
      const res = await fetch(`/api/owner/${token}`);

      if (!res.ok) {
        throw new Error(t("load_owner_failed"));
      }

      currentNode = await res.json();
    }

    async function fetchTimeline() {
      const res = await fetch(`/api/owner/${token}/events`);

      if (!res.ok) {
        throw new Error(t("load_timeline_failed"));
      }

      const data = await res.json();
      currentEvents = data.events || [];
    }

    async function refreshAll() {
      await fetchOwnerNode();
      await fetchTimeline();
      renderNode();
      renderTimeline();
    }

    function setActionStatus(message, type) {
      const el = document.getElementById("actionStatus");
      el.className = `hero-notice ${type === "error" ? "error" : "success"}`;
      el.textContent = message;
    }

    function clearActionStatus() {
      const el = document.getElementById("actionStatus");
      el.className = "hero-notice";
      el.textContent = "";
    }

    async function postOwnerUpdate(payload) {
      const res = await fetch(`/api/owner/${token}`, {
        method: "POST",
        headers: {
          "content-type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || t("update_failed"));
      }

      currentNode = await res.json();
      await fetchTimeline();
      renderNode();
      renderTimeline();
      setActionStatus(t("save_success"), "success");
    }

    function validateSelectedImage(file) {
      if (!file) {
        throw new Error(t("image_missing_selection"));
      }

      if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
        throw new Error(t("image_invalid_type"));
      }

      if (file.size > MAX_IMAGE_BYTES) {
        throw new Error(t("image_too_large"));
      }
    }

    async function handleImageInputChange(event) {
      const file = event.target.files && event.target.files[0] ? event.target.files[0] : null;

      clearActionStatus();

      if (!file) {
        clearSelectedImage();
        renderNodeImagePanel();
        return;
      }

      try {
        validateSelectedImage(file);

        selectedImageFile = file;
        revokeSelectedImagePreviewUrl();
        selectedImagePreviewUrl = URL.createObjectURL(file);

        renderNodeImagePanel();
        setActionStatus(t("image_selected_ready"), "success");
      } catch (error) {
        clearSelectedImage();
        renderNodeImagePanel();
        setActionStatus(error.message || t("image_upload_failed"), "error");
      }
    }

    function handleClearNodeImageSelection() {
      clearActionStatus();
      clearSelectedImage();
      renderNodeImagePanel();
      setActionStatus(t("image_selection_cleared"), "success");
    }

    async function handleSaveNodeImage() {
      clearActionStatus();

      try {
        validateSelectedImage(selectedImageFile);
      } catch (error) {
        setActionStatus(error.message || t("image_upload_failed"), "error");
        return;
      }

      imageOperationInFlight = true;
      setImageButtonsDisabledState();
      setActionStatus(t("image_uploading"), "success");

      try {
        const formData = new FormData();
        formData.append("image", selectedImageFile);

        const res = await fetch(`/api/owner/${token}/image`, {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || t("image_upload_failed"));
        }

        clearSelectedImage();
        await refreshAll();
        setActionStatus(t("image_upload_success"), "success");
      } catch (error) {
        setActionStatus(error.message || t("image_upload_failed"), "error");
      } finally {
        imageOperationInFlight = false;
        setImageButtonsDisabledState();
      }
    }

    async function handleRemoveNodeImage() {
      if (!getCurrentImageUrl()) {
        setActionStatus(t("image_delete_failed"), "error");
        return;
      }

      if (!window.confirm(t("image_remove_confirm"))) {
        return;
      }

      clearActionStatus();
      imageOperationInFlight = true;
      setImageButtonsDisabledState();
      setActionStatus(t("image_deleting"), "success");

      try {
        const res = await fetch(`/api/owner/${token}/image`, {
          method: "DELETE"
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || t("image_delete_failed"));
        }

        clearSelectedImage();
        await refreshAll();
        setActionStatus(t("image_delete_success"), "success");
      } catch (error) {
        setActionStatus(error.message || t("image_delete_failed"), "error");
      } finally {
        imageOperationInFlight = false;
        setImageButtonsDisabledState();
      }
    }

    async function handleSetStatus(nextStatus) {
      const confirmText = nextStatus === "active" ? t("confirm_set_active") : t("confirm_set_lost");

      if (!window.confirm(confirmText)) {
        return;
      }

      clearActionStatus();

      try {
        await postOwnerUpdate({ status: nextStatus });
      } catch (error) {
        setActionStatus(error.message || t("update_failed"), "error");
      }
    }

    async function handleToggleReports() {
      const nextValue = isTruthyDbValue(currentNode.allow_anonymous_report) ? 0 : 1;
      const confirmText = nextValue === 1 ? t("confirm_enable_reports") : t("confirm_disable_reports");

      if (!window.confirm(confirmText)) {
        return;
      }

      clearActionStatus();

      try {
        await postOwnerUpdate({ allow_anonymous_report: nextValue });
      } catch (error) {
        setActionStatus(error.message || t("update_failed"), "error");
      }
    }

    async function handleSaveIdentity() {
      clearActionStatus();

      try {
        const payload = {
          profile_name: document.getElementById("profileName").value,
          public_message: document.getElementById("publicMessage").value
        };

        await postOwnerUpdate(payload);
      } catch (error) {
        setActionStatus(error.message || t("update_failed"), "error");
      }
    }

    async function handleSaveContactSettings() {
      clearActionStatus();

      try {
        const payload = {
          phone: document.getElementById("phoneInput").value,
          sms: document.getElementById("smsInput").value,
          whatsapp: document.getElementById("whatsappInput").value,
          email: document.getElementById("emailInput").value,
          show_phone: document.getElementById("showPhoneInput").checked ? 1 : 0,
          show_sms: document.getElementById("showSmsInput").checked ? 1 : 0,
          show_whatsapp: document.getElementById("showWhatsappInput").checked ? 1 : 0,
          show_email: document.getElementById("showEmailInput").checked ? 1 : 0,
          preferred_contact: document.getElementById("preferredContact").value
        };

        await postOwnerUpdate(payload);
      } catch (error) {
        setActionStatus(error.message || t("update_failed"), "error");
      }
    }

    async function handleSaveLocation() {
      clearActionStatus();

      try {
        const payload = {
          last_recovery_label: document.getElementById("locationInput").value,
          show_last_recovery_point: document.getElementById("showLocationInput").checked ? 1 : 0
        };

        await postOwnerUpdate(payload);
      } catch (error) {
        setActionStatus(error.message || t("update_failed"), "error");
      }
    }

    async function handleReplaceCarrier() {
      if (!window.confirm(t("confirm_replace_carrier"))) {
        return;
      }

      clearActionStatus();

      const reason = document.getElementById("carrierReason").value;
      const notes = document.getElementById("carrierNotes").value;

      try {
        const res = await fetch(`/api/owner/${token}/carrier`, {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({ reason, notes })
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || t("carrier_failed"));
        }

        document.getElementById("carrierReason").value = "";
        document.getElementById("carrierNotes").value = "";

        await fetchTimeline();
        renderTimeline();
        setActionStatus(t("carrier_success"), "success");
      } catch (error) {
        setActionStatus(error.message || t("carrier_failed"), "error");
      }
    }

    function bindEvents() {
      document.getElementById("langFi").addEventListener("click", () => setLanguage("fi"));
      document.getElementById("langEn").addEventListener("click", () => setLanguage("en"));

      document.getElementById("setActiveButton").addEventListener("click", () => handleSetStatus("active"));
      document.getElementById("setLostButton").addEventListener("click", () => handleSetStatus("lost"));
      document.getElementById("toggleReportsButton").addEventListener("click", handleToggleReports);
      document.getElementById("saveIdentityButton").addEventListener("click", handleSaveIdentity);
      document.getElementById("saveContactSettingsButton").addEventListener("click", handleSaveContactSettings);
      document.getElementById("saveLocationButton").addEventListener("click", handleSaveLocation);
      document.getElementById("replaceCarrierButton").addEventListener("click", handleReplaceCarrier);

      document.getElementById("nodeImageInput").addEventListener("change", handleImageInputChange);
      document.getElementById("saveNodeImageButton").addEventListener("click", handleSaveNodeImage);
      document.getElementById("clearNodeImageSelectionButton").addEventListener("click", handleClearNodeImageSelection);
      document.getElementById("removeNodeImageButton").addEventListener("click", handleRemoveNodeImage);
    }

    async function init() {
      token = getToken();
      currentLang = getLanguage();

      renderStaticTexts();
      updateLanguageButtons();
      bindEvents();

      if (!token) {
        document.body.innerHTML = `<p class="error">${escapeHtml(t("missing_token"))}</p>`;
        return;
      }

      try {
        await refreshAll();
      } catch (error) {
        document.body.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
      }
    }

    window.addEventListener("beforeunload", () => {
      revokeSelectedImagePreviewUrl();
    });

    init();
  </script>
</body>
</html>
