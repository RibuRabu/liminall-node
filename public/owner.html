<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <title>Liminall Node</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/owner.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page">
      <div class="hero">
        <div class="hero-inner">
          <div class="topbar">
            <div class="topbar-left">
              <div class="brand-row">
                <div class="brand-logo-frame">
                  <img src="/logo.svg" alt="Liminall" class="brand-logo" />
                </div>

                <div class="brand-meta">
                  <div class="brand-name">Liminall</div>
                  <div class="eyebrow">Node-hallinta</div>
                </div>
              </div>

              <h1 id="pageTitle">Node-hallinta</h1>
              <div id="pageSubtitle" class="muted">Hallitse tunnisteen näkyvyyttä, yhteystapoja ja julkista sivua.</div>
            </div>

            <div class="topbar-right">
              <a id="openPublicPageButton" class="link-button disabled" href="#" target="_blank" rel="noopener noreferrer">Avaa Node</a>
              <button id="langFi" class="lang-button" type="button">FI</button>
              <button id="langEn" class="lang-button" type="button">EN</button>
            </div>
          </div>

          <div id="actionStatus" class="hero-notice"></div>

          <div class="hero-summary">
            <div id="heroSummary" class="hero-summary-grid"></div>
          </div>
        </div>
      </div>

      <div class="main-grid">
        <div class="stack">
          <div class="card">
            <div class="card-header">
              <h2 id="controlsCardTitle">Tunnisteen asetukset</h2>
            </div>

            <div class="section-stack">
              <div class="section-block">
                <h3 id="statusSectionTitle">Tila</h3>
                <div class="button-row">
                  <button id="setActiveButton" class="status-action-button status-action-active" type="button"></button>
                  <button id="setLostButton" class="status-action-button status-action-lost" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="identitySectionTitle">Tunniste</h3>

                <div class="field">
                  <label id="profileNameLabel" class="field-label" for="profileName"></label>
                  <input id="profileName" type="text" maxlength="120" />
                </div>

                <div class="field">
                  <label id="publicMessageLabel" class="field-label" for="publicMessage"></label>
                  <textarea id="publicMessage" maxlength="2000"></textarea>
                </div>

                <div class="button-row">
                  <button id="saveIdentityButton" class="primary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="locationSectionTitle">Sijainti</h3>
                <p id="locationSectionIntro" class="muted small"></p>

                <div class="field">
                  <label id="locationLabel" class="field-label" for="locationInput"></label>
                  <input id="locationInput" type="text" maxlength="255" />
                  <div id="locationHint" class="field-hint"></div>
                </div>

                <div class="button-row">
                  <label class="contact-toggle">
                    <input id="showLocationInput" type="checkbox" />
                    <span id="showLocationLabel"></span>
                  </label>
                </div>

                <div class="button-row">
                  <button id="saveLocationButton" class="primary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="contactSectionTitle">Yhteystavat</h3>
                <p id="contactSectionIntro" class="muted small"></p>

                <div class="field">
                  <label id="preferredContactLabel" class="field-label" for="preferredContact"></label>
                  <select id="preferredContact">
                    <option value="none"></option>
                    <option value="phone"></option>
                    <option value="sms"></option>
                    <option value="whatsapp"></option>
                    <option value="email"></option>
                  </select>
                  <div id="preferredContactHint" class="field-hint"></div>
                </div>

                <div class="contact-grid">
                  <div class="contact-row">
                    <div class="contact-row-top">
                      <label id="phoneLabel" class="field-label" for="phoneInput"></label>
                      <label class="contact-toggle">
                        <input id="showPhoneInput" type="checkbox" />
                        <span id="showPhoneLabel"></span>
                      </label>
                    </div>
                    <input id="phoneInput" type="text" maxlength="100" placeholder="" />
                  </div>

                  <div class="contact-row">
                    <div class="contact-row-top">
                      <label id="smsLabel" class="field-label" for="smsInput"></label>
                      <label class="contact-toggle">
                        <input id="showSmsInput" type="checkbox" />
                        <span id="showSmsLabel"></span>
                      </label>
                    </div>
                    <input id="smsInput" type="text" maxlength="100" placeholder="" />
                  </div>

                  <div class="contact-row">
                    <div class="contact-row-top">
                      <label id="whatsappLabel" class="field-label" for="whatsappInput"></label>
                      <label class="contact-toggle">
                        <input id="showWhatsappInput" type="checkbox" />
                        <span id="showWhatsappLabel"></span>
                      </label>
                    </div>
                    <input id="whatsappInput" type="text" maxlength="100" placeholder="" />
                  </div>

                  <div class="contact-row">
                    <div class="contact-row-top">
                      <label id="emailLabel" class="field-label" for="emailInput"></label>
                      <label class="contact-toggle">
                        <input id="showEmailInput" type="checkbox" />
                        <span id="showEmailLabel"></span>
                      </label>
                    </div>
                    <input id="emailInput" type="text" maxlength="255" placeholder="" />
                  </div>
                </div>

                <div class="button-row">
                  <button id="saveContactSettingsButton" class="primary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="scannerMessagesSectionTitle">Lähetä viesti omistajalle</h3>
                <p id="scannerMessagesIntro" class="muted small"></p>
                <div class="button-row">
                  <button id="toggleReportsButton" class="secondary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="carrierSectionTitle">Carrier</h3>

                <div class="field">
                  <label id="carrierReasonLabel" class="field-label" for="carrierReason"></label>
                  <input id="carrierReason" type="text" maxlength="255" />
                </div>

                <div class="field">
                  <label id="carrierNotesLabel" class="field-label" for="carrierNotes"></label>
                  <textarea id="carrierNotes" maxlength="1000"></textarea>
                </div>

                <div class="button-row">
                  <button id="replaceCarrierButton" class="secondary-button" type="button"></button>
                </div>
              </div>

              <div class="section-block">
                <h3 id="pinSectionTitle">Vaihda PIN</h3>

                <div class="field">
                  <label id="currentPinLabel" class="field-label" for="currentPinInput"></label>
                  <input id="currentPinInput" type="password" inputmode="numeric" maxlength="6" />
                </div>

                <div class="field">
                  <label id="newPinLabel" class="field-label" for="newPinInput"></label>
                  <input id="newPinInput" type="password" inputmode="numeric" maxlength="6" />
                </div>

                <div class="field">
                  <label id="confirmPinLabel" class="field-label" for="confirmPinInput"></label>
                  <input id="confirmPinInput" type="password" inputmode="numeric" maxlength="6" />
                </div>

                <div id="pinStatus" class="muted small"></div>

                <div class="button-row">
                  <button id="changePinButton" class="secondary-button" type="button"></button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="stack">
          <div class="card">
            <div class="node-panel">
              <div class="node-panel-head">
                <div class="node-panel-name">
                  <div class="muted small" id="nodeCardTitle">Node-linkki</div>
                  <div class="node-panel-title" id="nodePanelTitle">Node</div>
                  <div class="node-panel-subtitle" id="controlsCardIntro"></div>
                </div>
              </div>

              <div id="nodeInfo"></div>

              <div class="node-image-card">
                <div id="nodeImagePreview" class="node-image-preview empty"></div>

                <div class="field">
                  <label id="nodeImageInputLabel" class="field-label" for="nodeImageInput"></label>
                  <input id="nodeImageInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
                  <div id="nodeImageHint" class="field-hint"></div>
                </div>

                <div class="button-row">
                  <button id="saveNodeImageButton" class="primary-button" type="button"></button>
                  <button id="clearNodeImageSelectionButton" class="ghost-button" type="button"></button>
                  <button id="removeNodeImageButton" class="danger-button" type="button"></button>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 id="timelineTitle"></h2>
            </div>
            <div id="timeline" class="timeline"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/owner.js"></script>
</body>
</html>
