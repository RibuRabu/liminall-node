<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Control</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ececec;
      --card: #ffffff;
      --border: #d8d8d8;
      --text: #111111;
      --muted: #666666;
      --accent: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    h1, h2 {
      margin: 0 0 16px;
    }

    h1 {
      font-size: 2rem;
    }

    h2 {
      font-size: 1.15rem;
      margin-top: 24px;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .muted {
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px 8px;
      margin: 0;
    }

    legend {
      padding: 0 6px;
      font-weight: 700;
    }

    .checks {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 400;
    }

    .check input {
      width: auto;
      margin: 0;
    }

    .row {
      display: grid;
      gap: 12px;
    }

    @media (min-width: 720px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }

      .row.three {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #f3f3f3;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-box {
      white-space: pre-wrap;
      background: #f7f7f7;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-top: 16px;
      font-size: 0.92rem;
    }

    .preview {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .preview img {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fafafa;
    }

    .token {
      word-break: break-all;
      background: #f7f7f7;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: Consolas, monospace;
      font-size: 0.9rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Owner Control</h1>
      <p class="muted">Hallinnoi tätä tunnistetta owner-tokenilla.</p>

      <div id="token-state" class="token">Ladataan owner-tokenia...</div>

      <form id="owner-form" class="stack hidden">
        <h2>Perustiedot</h2>

        <div class="row two">
          <label>
            Nimi
            <input name="profile_name" type="text" />
          </label>

          <label>
            Tunniste / ID
            <input name="public_identifier" type="text" />
          </label>
        </div>

        <label>
          Viesti löytäjälle
          <textarea name="public_message"></textarea>
        </label>

        <div class="row two">
          <label>
            Status
            <select name="status">
              <option value="active">active</option>
              <option value="lost">lost</option>
            </select>
          </label>

          <label>
            Kuvan URL
            <input name="profile_image_url" type="text" />
          </label>
        </div>

        <div class="preview">
          <strong>Kuvan esikatselu</strong>
          <img id="image-preview" alt="Kuvan esikatselu" />
        </div>

        <h2>Yhteystiedot</h2>

        <div class="row two">
          <label>
            Puhelin
            <input name="phone" type="text" />
          </label>

          <label>
            Sähköposti
            <input name="email" type="email" />
          </label>
        </div>

        <label>
          WhatsApp
          <input name="whatsapp" type="text" />
        </label>

        <h2>Viimeinen havaintopaikka</h2>

        <div class="row three">
          <label>
            Paikan nimi
            <input name="last_recovery_label" type="text" />
          </label>

          <label>
            Lat
            <input name="last_recovery_lat" type="number" step="any" />
          </label>

          <label>
            Lng
            <input name="last_recovery_lng" type="number" step="any" />
          </label>
        </div>

        <h2>Näkyvyysasetukset</h2>

        <fieldset>
          <legend>Public näkyvyys</legend>
          <div class="checks">
            <label class="check"><input type="checkbox" name="show_profile_name" /> Näytä nimi</label>
            <label class="check"><input type="checkbox" name="show_profile_image" /> Näytä kuva</label>
            <label class="check"><input type="checkbox" name="show_identifier" /> Näytä tunniste</label>
            <label class="check"><input type="checkbox" name="show_message" /> Näytä viesti</label>
            <label class="check"><input type="checkbox" name="show_phone" /> Näytä puhelin</label>
            <label class="check"><input type="checkbox" name="show_email" /> Näytä sähköposti</label>
            <label class="check"><input type="checkbox" name="show_whatsapp" /> Näytä WhatsApp</label>
            <label class="check"><input type="checkbox" name="show_last_recovery_point" /> Näytä viimeinen havaintopaikka</label>
            <label class="check"><input type="checkbox" name="allow_anonymous_report" /> Salli anonyymi ilmoitus</label>
          </div>
        </fieldset>

        <div class="actions">
          <button type="submit" id="save-button">Tallenna</button>
          <button type="button" class="secondary" id="reload-button">Lataa uudelleen</button>
        </div>
      </form>

      <h2>Kuvan lataus</h2>
      <form id="image-form" class="stack hidden">
        <label>
          Valitse kuva
          <input type="file" id="image-file" accept="image/*" />
        </label>
        <div class="actions">
          <button type="submit" id="upload-button">Lataa kuva</button>
        </div>
      </form>

      <div id="status-box" class="status-box">Valmis.</div>
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("status-box");
    const tokenState = document.getElementById("token-state");
    const ownerForm = document.getElementById("owner-form");
    const imageForm = document.getElementById("image-form");
    const imagePreview = document.getElementById("image-preview");
    const reloadButton = document.getElementById("reload-button");
    const saveButton = document.getElementById("save-button");
    const uploadButton = document.getElementById("upload-button");

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function getTokenFromPath() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      if (parts.length >= 2 && parts[0] === "o") return parts[1];

      const qp = new URLSearchParams(window.location.search);
      return qp.get("token") || "";
    }

    const ownerToken = getTokenFromPath();

    function setImagePreview(url) {
      if (url && url.trim()) {
        imagePreview.src = url;
        imagePreview.classList.remove("hidden");
      } else {
        imagePreview.removeAttribute("src");
        imagePreview.classList.add("hidden");
      }
    }

    function toCheckboxValue(value) {
      return value === 1 || value === "1" || value === true;
    }

    function fillForm(data) {
      ownerForm.elements.profile_name.value = data.profile_name || "";
      ownerForm.elements.public_identifier.value = data.public_identifier || "";
      ownerForm.elements.public_message.value = data.public_message || "";
      ownerForm.elements.status.value = data.status || "active";
      ownerForm.elements.profile_image_url.value = data.profile_image_url || "";
      ownerForm.elements.phone.value = data.phone || "";
      ownerForm.elements.email.value = data.email || "";
      ownerForm.elements.whatsapp.value = data.whatsapp || "";
      ownerForm.elements.last_recovery_label.value = data.last_recovery_label || "";
      ownerForm.elements.last_recovery_lat.value = data.last_recovery_lat ?? "";
      ownerForm.elements.last_recovery_lng.value = data.last_recovery_lng ?? "";

      ownerForm.elements.show_profile_name.checked = toCheckboxValue(data.show_profile_name);
      ownerForm.elements.show_profile_image.checked = toCheckboxValue(data.show_profile_image);
      ownerForm.elements.show_identifier.checked = toCheckboxValue(data.show_identifier);
      ownerForm.elements.show_message.checked = toCheckboxValue(data.show_message);
      ownerForm.elements.show_phone.checked = toCheckboxValue(data.show_phone);
      ownerForm.elements.show_email.checked = toCheckboxValue(data.show_email);
      ownerForm.elements.show_whatsapp.checked = toCheckboxValue(data.show_whatsapp);
      ownerForm.elements.show_last_recovery_point.checked = toCheckboxValue(data.show_last_recovery_point);
      ownerForm.elements.allow_anonymous_report.checked = toCheckboxValue(data.allow_anonymous_report);

      setImagePreview(data.profile_image_url || "");
    }

    async function loadOwnerData() {
      if (!ownerToken) {
        tokenState.textContent = "Owner-token puuttuu URL:sta.";
        setStatus("Virhe: owner-token puuttuu.");
        return;
      }

      tokenState.textContent = `Owner token: ${ownerToken}`;

      try {
        setStatus("Ladataan owner-dataa...");
        const response = await fetch(`/api/owner/${ownerToken}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Owner-datan haku epäonnistui.");
        }

        fillForm(data);
        ownerForm.classList.remove("hidden");
        imageForm.classList.remove("hidden");
        setStatus("Owner-data ladattu.");
      } catch (error) {
        setStatus(`Virhe: ${error.message}`);
      }
    }

    function collectPayload() {
      return {
        profile_name: ownerForm.elements.profile_name.value.trim(),
        public_identifier: ownerForm.elements.public_identifier.value.trim(),
        public_message: ownerForm.elements.public_message.value.trim(),
        status: ownerForm.elements.status.value,
        profile_image_url: ownerForm.elements.profile_image_url.value.trim(),
        phone: ownerForm.elements.phone.value.trim(),
        email: ownerForm.elements.email.value.trim(),
        whatsapp: ownerForm.elements.whatsapp.value.trim(),
        last_recovery_label: ownerForm.elements.last_recovery_label.value.trim(),
        last_recovery_lat: ownerForm.elements.last_recovery_lat.value === "" ? null : Number(ownerForm.elements.last_recovery_lat.value),
        last_recovery_lng: ownerForm.elements.last_recovery_lng.value === "" ? null : Number(ownerForm.elements.last_recovery_lng.value),
        show_profile_name: ownerForm.elements.show_profile_name.checked ? 1 : 0,
        show_profile_image: ownerForm.elements.show_profile_image.checked ? 1 : 0,
        show_identifier: ownerForm.elements.show_identifier.checked ? 1 : 0,
        show_message: ownerForm.elements.show_message.checked ? 1 : 0,
        show_phone: ownerForm.elements.show_phone.checked ? 1 : 0,
        show_email: ownerForm.elements.show_email.checked ? 1 : 0,
        show_whatsapp: ownerForm.elements.show_whatsapp.checked ? 1 : 0,
        show_last_recovery_point: ownerForm.elements.show_last_recovery_point.checked ? 1 : 0,
        allow_anonymous_report: ownerForm.elements.allow_anonymous_report.checked ? 1 : 0
      };
    }

    ownerForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      try {
        saveButton.disabled = true;
        setStatus("Tallennetaan...");

        const payload = collectPayload();
        const response = await fetch(`/api/owner/${ownerToken}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.error || "Tallennus epäonnistui.");
        }

        setImagePreview(payload.profile_image_url);
        setStatus("Tallennus onnistui.");
      } catch (error) {
        setStatus(`Virhe: ${error.message}`);
      } finally {
        saveButton.disabled = false;
      }
    });

    reloadButton.addEventListener("click", async () => {
      await loadOwnerData();
    });

    ownerForm.elements.profile_image_url.addEventListener("input", (event) => {
      setImagePreview(event.target.value);
    });

    imageForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const fileInput = document.getElementById("image-file");
      const file = fileInput.files[0];

      if (!file) {
        setStatus("Valitse ensin kuva.");
        return;
      }

      try {
        uploadButton.disabled = true;
        setStatus("Ladataan kuvaa...");

        const formData = new FormData();
        formData.append("image", file);

        const response = await fetch(`/api/owner/${ownerToken}/image`, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Kuvan lataus epäonnistui.");
        }

        if (data.imageUrl) {
          ownerForm.elements.profile_image_url.value = data.imageUrl;
          setImagePreview(data.imageUrl);
        }

        setStatus("Kuvan lataus onnistui.");
      } catch (error) {
        setStatus(`Virhe: ${error.message}`);
      } finally {
        uploadButton.disabled = false;
      }
    });

    loadOwnerData();
  </script>
</body>
</html>
